<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swish</title>

<style>
body{
  margin:0;
  background:#071b2c;
  font-family:-apple-system,BlinkMacSystemFont;
  color:white;
}
.app{
  max-width:390px;
  margin:auto;
  padding:16px;
}
.card{
  background:#0b243a;
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
}
.label{
  opacity:.7;
  margin-bottom:10px;
}
.input{
  width:100%;
  border:none;
  background:transparent;
  color:white;
  font-size:22px;
  outline:none;
}
.button{
  position:fixed;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:360px;
  background:#4da3ff;
  padding:16px;
  border-radius:30px;
  text-align:center;
  font-size:20px;
}
</style>
</head>

<body>

<div class="app">

  <div class="card">
    <div class="label">Mottagare</div>
    <input id="name" class="input" placeholder="Namn eller nummer">
  </div>

  <div class="card">
    <div class="label">Nummer</div>
    <input id="number" class="input" placeholder="7XXXXXXXX">
  </div>

  <div class="card">
    <div class="label">Belopp</div>
    <input id="amount" class="input" placeholder="1">
  </div>

</div>

<div class="button" onclick="go()">Swisha</div>

<script>
function go(){
  const name = document.getElementById('name').value;
  const number = document.getElementById('number').value;
  const amount = document.getElementById('amount').value;

  const now = new Date();
  const date = now.toLocaleString('sv-SE', {
    day: 'numeric',
    month: 'short',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });

  localStorage.setItem('name', name);
  localStorage.setItem('number', '+46 ' + number);
  localStorage.setItem('amount', amount);
  localStorage.setItem('date', date);

  window.location.href = "index2.html";
}
</script>

</body>
</html>
