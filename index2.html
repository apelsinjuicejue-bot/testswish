<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klar</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#04192b;
  color:white;
  overflow:hidden;
}

/* TOP GREEN */
.top{
  position:relative;
  height:58vh;
  background:linear-gradient(140deg,#7ED321 0%, #4FA52C 100%);
  border-bottom-left-radius:50% 18%;
  border-bottom-right-radius:50% 18%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* CANVAS */
canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

/* CHECK CIRCLE */
.circle{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.35);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:16px;
}

/* SVG CHECK */
.check{
  width:42px;
  height:42px;
}

.check path{
  stroke:white;
  stroke-width:3;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:50;
  stroke-dashoffset:50;
  animation:draw 0.6s ease forwards;
  animation-delay:0.2s;
}

@keyframes draw{
  to{stroke-dashoffset:0;}
}

/* TEXT */
.success{
  font-size:26px;
  font-weight:500;
}

/* CONTENT */
.content{
  text-align:center;
  margin-top:20px;
}

.date{
  opacity:.6;
  font-size:15px;
  margin-bottom:10px;
}

.name{
  font-size:26px;
}

.number{
  opacity:.7;
  margin-top:6px;
}

.amount{
  font-size:64px;
  margin-top:20px;
}

/* LOGO */
.logo{
  position:absolute;
  bottom:40px;
  width:100%;
  text-align:center;
}

/* CLOSE */
.close{
  position:absolute;
  right:20px;
  bottom:30px;
  width:64px;
  height:64px;
  border-radius:50%;
  background:#0f2740;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}
</style>
</head>

<body>

<div class="top">
  <canvas id="canvas"></canvas>

  <div class="circle">
    <svg class="check" viewBox="0 0 24 24">
      <path d="M5 13l4 4L19 7"></path>
    </svg>
  </div>

  <div class="success">Din betalning är skickad!</div>
</div>

<div class="content">
  <div class="date" id="date"></div>
  <div class="name" id="name"></div>
  <div class="number" id="number"></div>
  <div class="amount" id="amount"></div>
</div>

<div class="logo">
  <img src="swisher2.png" width="120">
</div>

<div class="close" onclick="back()">✕</div>

<script>
// DATA
document.getElementById('name').innerText = localStorage.getItem('name');
document.getElementById('number').innerText = localStorage.getItem('number');
document.getElementById('amount').innerText = localStorage.getItem('amount') + " kr";
document.getElementById('date').innerText = localStorage.getItem('date');

function back(){
  window.location.href = "index.html";
}

// ===== PARTICLES (REAL SWISH STYLE) =====
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight * 0.58;

let particles = [];

function createParticles(){
  for(let i=0;i<40;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*3+1,
      speed:Math.random()*0.5+0.2
    });
  }
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.y -= p.speed;

    if(p.y < 0){
      p.y = canvas.height;
      p.x = Math.random()*canvas.width;
    }

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

// START AFTER 1 SECOND
setTimeout(()=>{
  createParticles();
  animate();
},1000);
</script>

</body>
</html>
